<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chartered House of Change — Coming Soon</title>
    <meta name="description" content="Chartered House of Change — Products coming soon." />
    <link rel="icon" type="image/png" href="CHOC logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --white: #ffffff;
            --bone: #f7f5f1;
            --grey-100: #e3e3e1;
            --grey-300: #b8b8b6;
            --grey-500: #7a7a78;
            --grey-700: #4a4a48;
            --ink: #1c1c1b;
            --gold: #b8965a;
            --gold-light: #d4b97c;
            --serif: 'Cormorant Garamond', 'Times New Roman', serif;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --ease: cubic-bezier(.2,.7,.2,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background: var(--bone);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            overflow: hidden;
            position: relative;
        }

        /* Subtle radial gold glow background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
              radial-gradient(circle at 20% 30%, rgba(184,150,90,.08), transparent 55%),
              radial-gradient(circle at 80% 75%, rgba(184,150,90,.05), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* Fine grain texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    rgba(0,0,0,.012) 0px,
                    rgba(0,0,0,.012) 1px,
                    transparent 1px,
                    transparent 3px
                );
            pointer-events: none;
            z-index: 1;
        }

        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 40px 48px;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10.5px;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--grey-500);
            font-weight: 500;
        }
        .top-bar .gold-text { color: var(--gold); }

        /* ===== MAIN ===== */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 36px;
            padding: 40px 20px;
        }

        .logo-wrap {
            opacity: 0;
            transform: translateY(20px);
            animation: rise 1.1s var(--ease) .1s forwards;
        }
        .logo-wrap img {
            width: 220px;
            max-width: 60vw;
            height: auto;
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            animation: rise 1.1s var(--ease) .35s forwards;
        }
        .divider .line {
            width: 60px;
            height: 1px;
            background: var(--grey-300);
        }
        .divider .diamond {
            color: var(--gold);
            font-size: 8px;
            letter-spacing: 0;
        }

        .brand-name {
            font-family: var(--serif);
            font-weight: 300;
            font-size: clamp(34px, 5.5vw, 64px);
            line-height: 1.05;
            letter-spacing: .02em;
            color: var(--ink);
            opacity: 0;
            animation: rise 1.1s var(--ease) .5s forwards;
        }
        .brand-name .italic {
            font-style: italic;
            font-weight: 400;
            color: var(--gold);
        }

        .tagline {
            font-size: 11px;
            letter-spacing: .42em;
            text-transform: uppercase;
            color: var(--grey-500);
            font-weight: 500;
            opacity: 0;
            animation: rise 1.1s var(--ease) .7s forwards;
        }

        .coming-soon-block {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            opacity: 0;
            animation: rise 1.1s var(--ease) .9s forwards;
        }

        .coming-soon {
            font-family: var(--serif);
            font-style: italic;
            font-weight: 300;
            font-size: clamp(20px, 2.4vw, 30px);
            color: var(--grey-700);
            letter-spacing: .01em;
        }
        .coming-soon .accent {
            color: var(--gold);
            font-style: normal;
            margin: 0 6px;
        }

        /* ===== NEWSLETTER ===== */
        .notify {
            margin-top: 12px;
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--grey-300);
            width: min(420px, 80vw);
            transition: border-color .3s var(--ease);
        }
        .notify:focus-within { border-color: var(--gold); }
        .notify input {
            flex: 1;
            padding: 14px 4px;
            background: transparent;
            border: 0;
            color: var(--ink);
            font-family: var(--sans);
            font-size: 13px;
            outline: none;
            letter-spacing: .04em;
        }
        .notify input::placeholder { color: var(--grey-500); }
        .notify button {
            padding: 14px 6px 14px 22px;
            background: transparent;
            border: 0;
            color: var(--gold);
            font-family: var(--sans);
            font-size: 10.5px;
            letter-spacing: .3em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color .3s var(--ease);
            font-weight: 500;
        }
        .notify button:hover { color: var(--ink); }

        .fineprint {
            font-size: 10px;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--grey-500);
        }

        /* ===== FOOTER ===== */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10.5px;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--grey-500);
            font-weight: 500;
        }
        footer .socials { display: flex; gap: 26px; }
        footer a { color: inherit; text-decoration: none; transition: color .25s var(--ease); }
        footer a:hover { color: var(--gold); }

        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body { overflow-y: auto; }
            .page { padding: 24px 22px; gap: 32px; }
            .top-bar, footer {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .logo-wrap img { width: 160px; }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <span>Est. <span class="gold-text">MMXXVI</span></span>
        <span>Chartered House of Change</span>
    </div>

    <!-- ===== MAIN ===== -->
    <main>
        <div class="logo-wrap">
            <img src="CHOC logo.png" alt="Chartered House of Change" />
        </div>

        <div class="divider">
            <span class="line"></span>
            <span class="diamond">◆</span>
            <span class="line"></span>
        </div>

        <h1 class="brand-name">
            Chartered House <span class="italic">of</span> Change
        </h1>

        <div class="coming-soon-block">
            <p class="coming-soon">
                Big things are coming soon<span class="accent">...</span>
            </p>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <span>© MMXXVI CHOC</span>
        <div class="socials">
            <a href="https://www.instagram.com/charteredhouseofchange/" target="_blank" rel="noopener">Instagram</a>
        </div>
    </footer>

</div>

</body>
</html>
